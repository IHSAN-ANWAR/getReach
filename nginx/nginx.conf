worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ── Connection tuning ──
    keepalive_timeout       65;
    keepalive_requests      1000;
    sendfile                on;
    tcp_nopush              on;
    tcp_nodelay             on;
    client_max_body_size    2m;

    # ── Gzip ──
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 256;

    # ── Rate limiting zones ──
    limit_req_zone  $binary_remote_addr zone=login:10m  rate=10r/m;
    limit_req_zone  $binary_remote_addr zone=api:10m    rate=300r/m;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # ── Upstream — Node.js instances (horizontal scaling) ──
    upstream getreach_api {
        least_conn;                          # route to least busy instance
        server api1:5000 max_fails=3 fail_timeout=30s;
        server api2:5000 max_fails=3 fail_timeout=30s;
        server api3:5000 max_fails=3 fail_timeout=30s;
        keepalive 64;                        # persistent connections to upstream
    }

    server {
        listen 80;
        server_name _;

        # ── Security headers ──
        add_header X-Frame-Options        DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection       "1; mode=block";

        # ── Health check (no rate limit) ──
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ── Login — strict rate limit ──
        location ~ ^/api/(login|register|forgot-password) {
            limit_req zone=login burst=5 nodelay;
            limit_conn conn 20;
            proxy_pass         http://getreach_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # ── All other API routes ──
        location /api/ {
            limit_req  zone=api burst=50 nodelay;
            limit_conn conn 50;
            proxy_pass         http://getreach_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
    }
}
