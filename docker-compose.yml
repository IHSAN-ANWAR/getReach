version: '3.9'

# ─────────────────────────────────────────────────────────────
#  GetReach — Horizontal Scaling Stack
#
#  Architecture:
#    nginx (load balancer)
#      └── api1, api2, api3  (Node.js workers — scale as needed)
#            └── MongoDB Atlas  (external)
#            └── Redis          (shared cache)
#
#  Scale up:   docker-compose up --scale api=5 -d
#  Scale down: docker-compose up --scale api=2 -d
#  Logs:       docker-compose logs -f api1
# ─────────────────────────────────────────────────────────────

services:

  # ── Redis — shared session/cache layer ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - getreach

  # ── API Instance 1 ──
  api1:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    env_file: server/.env
    environment:
      PORT: 5000
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - getreach

  # ── API Instance 2 ──
  api2:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    env_file: server/.env
    environment:
      PORT: 5000
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - getreach

  # ── API Instance 3 ──
  api3:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    env_file: server/.env
    environment:
      PORT: 5000
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - getreach

  # ── Nginx — load balancer ──
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
      - api3
    networks:
      - getreach

networks:
  getreach:
    driver: bridge
