  <path d="M32 44 L20 38" stroke="#1A2517" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <path d="M32 32 L42 26" stroke="#1A2517" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <path d="M32 44 L44 38" stroke="#1A2517" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <defs>
