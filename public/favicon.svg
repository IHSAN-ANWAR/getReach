<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark green rounded square background -->
  <rect width="64" height="64" rx="14" fill="#1A2517"/>
  
  <!-- Leaf icon (matches the FaLeaf style used in the app) -->
